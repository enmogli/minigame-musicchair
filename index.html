<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音樂椅大冒險</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#fdf4e3;display:flex;justify-content:center;padding:1rem;}
#wrap{background:#fff9f0;border-radius:16px;overflow:hidden;width:620px;max-width:100%;}
#intro-screen{padding:1.5rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.75rem;}
h1{font-size:22px;font-weight:600;color:#7c4a1e;}
.rule-box{font-size:12px;color:#9c6b38;background:#fff3e0;border-radius:10px;padding:9px 16px;max-width:380px;line-height:1.8;}
#bear-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:0.4rem 0;}
.bcard{cursor:pointer;border:2.5px solid #e8d0a8;border-radius:12px;padding:8px 12px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform 0.12s,border-color 0.12s;}
.bcard:hover{transform:scale(1.06);border-color:#f0b080;}
.bcard.sel{border-color:#e05c3a;background:#fff6f2;transform:scale(1.09);}
.bcard span{font-size:11px;font-weight:600;color:#7c4a1e;}
#confirm-zone{min-height:80px;display:flex;flex-direction:column;align-items:center;gap:8px;justify-content:center;}
#hint{font-size:13px;color:#c0956a;}
#sel-info{font-size:13px;color:#9c6b38;background:#fff3e0;border-radius:8px;padding:7px 18px;display:none;}
#btn-go{padding:10px 34px;font-size:14px;font-weight:600;background:#e05c3a;color:#fff;border:none;border-radius:40px;cursor:pointer;display:none;transition:transform 0.1s;}
#btn-go:hover{transform:scale(1.05);}
#game-screen{display:none;flex-direction:column;}
#hud{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#fff3e0;border-bottom:1px solid #f0c98a;flex-wrap:wrap;gap:4px;}
#hud-r{font-size:13px;font-weight:600;color:#7c4a1e;}
#hud-s{font-size:12px;color:#9c6b38;}
#sbar{display:flex;gap:5px;align-items:center;}
.sdot{width:13px;height:13px;border-radius:50%;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.1);}
#arena-wrap{position:relative;}
canvas{display:block;width:100%;}
#omsg{position:absolute;left:50%;transform:translateX(-50%);top:38%;background:rgba(80,25,5,0.84);color:#fff;border-radius:18px;padding:9px 24px;font-size:14px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.22s;z-index:5;}
#omsg.on{opacity:1;}
#ctrl{display:flex;gap:8px;padding:9px 12px;background:#fff9f0;border-top:1px solid #f0c98a;flex-wrap:wrap;align-items:center;}
#ctrl button{padding:7px 16px;font-size:12px;border-radius:28px;border:1.5px solid #e8b080;background:#fff;color:#7c4a1e;cursor:pointer;font-weight:600;transition:background 0.1s;}
#ctrl button:hover:not(:disabled){background:#fde8d0;}
#ctrl button:disabled{opacity:0.38;cursor:default;}
#bms{background:#e05c3a;color:#fff;border-color:#e05c3a;}
#bms:hover:not(:disabled){background:#c94a2a;}
</style>
</head>
<body>
<div id="wrap">
<div id="intro-screen">
  <h1>音樂椅大冒險</h1>
  <p style="font-size:13px;color:#9c6b38;max-width:360px;line-height:1.65;">音樂響起，小熊繞圈跑！音樂一停，快去搶椅子！<br>沒搶到座位的小熊會被大熊警長抓走淘汰哦！</p>
  <div class="rule-box">音樂停時，點擊椅子讓你的熊熊衝過去坐下<br>每輪少一張椅子，最後存活的熊熊獲勝！</div>
  <p style="font-size:13px;color:#b87a40;font-weight:600;">選擇你的熊熊：</p>
  <div id="bear-row"></div>
  <div id="confirm-zone">
    <div id="hint">請先點選一隻熊熊</div>
    <div id="sel-info"></div>
    <button id="btn-go">就決定是你了！出發！</button>
  </div>
</div>
<div id="game-screen">
  <div id="hud">
    <span id="hud-r">第 1 輪</span>
    <span id="hud-s">按開始音樂</span>
    <div id="sbar"></div>
  </div>
  <div id="arena-wrap">
    <canvas id="cv" width="600" height="430"></canvas>
    <div id="omsg"></div>
  </div>
  <div id="ctrl">
    <button id="bms">▶ 開始音樂</button>
    <button id="bss" disabled>■ 停止音樂</button>
    <button id="bbk" style="margin-left:auto;">← 回主選單</button>
  </div>
</div>
</div>
<script>
const BC=[{body:'#e05c3a',belly:'#f0997b',name:'番茄熊'},{body:'#4a9ede',belly:'#85c7f5',name:'藍莓熊'},{body:'#6cc04a',belly:'#a8e07a',name:'青蛙熊'},{body:'#f0a030',belly:'#fac97a',name:'蜜糖熊'},{body:'#9b59b6',belly:'#c39bd3',name:'葡萄熊'},{body:'#e91e8a',belly:'#f48fbf',name:'草莓熊'}];
const W=600,H=430,CX=W/2,CY=H/2+10,OR=140,WR=182;
let sel=-1,G={},af=null,sT=null,gT=null,mT=null,ac=null,mi=null;

function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function pNote(f,s,d,v,t){v=v||0.16;t=t||'sine';const a=getAC(),o=a.createOscillator(),gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.setValueAtTime(0,a.currentTime+s);gn.gain.linearRampToValueAtTime(v,a.currentTime+s+0.02);gn.gain.linearRampToValueAtTime(0,a.currentTime+s+d-0.02);o.connect(gn);gn.connect(a.destination);o.start(a.currentTime+s);o.stop(a.currentTime+s+d);}
function pML(){const m=[523,587,659,698,784,880,784,698,659,587,523,493,440,493,523,523];let t=0;m.forEach(function(f){pNote(f,t,0.18,0.13);t+=0.2;});[262,294,330,349].forEach(function(f,i){pNote(f,i*0.4,0.35,0.07,'triangle');});}
function startAudio(){mi=setInterval(function(){if(G.phase==='music')pML();},3200);pML();}
function stopAudio(){clearInterval(mi);mi=null;}
function pStop(){pNote(200,0,0.4,0.22,'sawtooth');pNote(150,0.35,0.5,0.18,'sawtooth');}
function pGrab(){[440,330,220].forEach(function(f,i){pNote(f,i*0.15,0.2,0.18,'square');});}
function pWin(){[523,659,784,1047].forEach(function(f,i){pNote(f,i*0.18,0.35,0.16,'sine');});}

function drawBear(cx,x,y,r,col,isP,wt,seated,big,eyeClose,grabbed){
  cx.save();cx.translate(x,y);
  if(seated)cx.translate(0,4);
  cx.rotate(seated?0.14:Math.sin(wt)*0.08);
  cx.save();cx.scale(1,0.33);cx.beginPath();cx.arc(0,r*1.1,r*0.78,0,Math.PI*2);cx.fillStyle='rgba(0,0,0,0.07)';cx.fill();cx.restore();
  if(!seated){
    var ls=Math.sin(wt)*9,rs=-Math.sin(wt)*9;
    cx.save();cx.strokeStyle=col.body;cx.lineWidth=r*0.44;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-r*0.37,r*0.58);cx.lineTo(-r*0.37+ls*0.07,r*1.04+Math.abs(ls)*0.03);cx.stroke();
    cx.beginPath();cx.moveTo(r*0.37,r*0.58);cx.lineTo(r*0.37+rs*0.07,r*1.04+Math.abs(rs)*0.03);cx.stroke();
    cx.restore();
  } else {
    cx.save();cx.strokeStyle=col.body;cx.lineWidth=r*0.37;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-r*0.4,r*0.53);cx.lineTo(-r*0.54,r*0.83);cx.stroke();
    cx.beginPath();cx.moveTo(r*0.4,r*0.53);cx.lineTo(r*0.54,r*0.83);cx.stroke();
    cx.restore();
  }
  var as=seated?0:Math.cos(wt)*7;
  cx.save();cx.strokeStyle=col.body;cx.lineWidth=r*0.37;cx.lineCap='round';
  if(big&&eyeClose){
    cx.beginPath();cx.moveTo(-r*0.5,r*0.08);cx.lineTo(-r*0.18,-r*0.32);cx.stroke();
    cx.beginPath();cx.moveTo(r*0.5,r*0.08);cx.lineTo(r*0.18,-r*0.32);cx.stroke();
  } else if(grabbed){
    cx.beginPath();cx.moveTo(-r*0.5,0);cx.lineTo(-r*0.88,-r*0.28);cx.stroke();
    cx.beginPath();cx.moveTo(r*0.5,0);cx.lineTo(r*0.88,-r*0.28);cx.stroke();
  } else {
    cx.beginPath();cx.moveTo(-r*0.58,r*0.08);cx.lineTo(-r*0.88,r*0.08+as*0.04);cx.stroke();
    cx.beginPath();cx.moveTo(r*0.58,r*0.08);cx.lineTo(r*0.88,r*0.08-as*0.04);cx.stroke();
  }
  cx.restore();
  var er=big?r*0.37:r*0.33;
  [-r*0.58,r*0.58].forEach(function(ex){
    cx.beginPath();cx.arc(ex,-r*0.58,er,0,Math.PI*2);cx.fillStyle=col.body;cx.fill();
    cx.beginPath();cx.arc(ex,-r*0.58,er*0.54,0,Math.PI*2);cx.fillStyle=col.belly;cx.fill();
  });
  cx.beginPath();cx.ellipse(0,0,r,r*1.04,0,0,Math.PI*2);cx.fillStyle=col.body;cx.fill();
  cx.beginPath();cx.ellipse(0,r*0.19,r*0.51,r*0.44,0,0,Math.PI*2);cx.fillStyle=col.belly;cx.fill();
  var hy=-r*0.05;
  cx.beginPath();cx.ellipse(0,hy+r*0.17,r*0.31,r*0.21,0,0,Math.PI*2);cx.fillStyle=col.belly;cx.fill();
  if(big&&eyeClose){
    cx.strokeStyle='#3a1a05';cx.lineWidth=r*0.09;cx.lineCap='round';
    cx.beginPath();cx.arc(-r*0.27,hy-r*0.07,r*0.11,Math.PI,0);cx.stroke();
    cx.beginPath();cx.arc(r*0.27,hy-r*0.07,r*0.11,Math.PI,0);cx.stroke();
  } else if(grabbed){
    cx.strokeStyle='#3a1a05';cx.lineWidth=r*0.1;
    [-1,1].forEach(function(s){var ex=s*r*0.27,ey=hy-r*0.09;cx.beginPath();cx.moveTo(ex-r*0.1,ey-r*0.1);cx.lineTo(ex+r*0.1,ey+r*0.1);cx.stroke();cx.beginPath();cx.moveTo(ex+r*0.1,ey-r*0.1);cx.lineTo(ex-r*0.1,ey+r*0.1);cx.stroke();});
  } else {
    cx.fillStyle='#2a0f00';
    cx.beginPath();cx.arc(-r*0.27,hy-r*0.07,r*0.1,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(r*0.27,hy-r*0.07,r*0.1,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,255,255,0.72)';
    cx.beginPath();cx.arc(-r*0.23,hy-r*0.11,r*0.04,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(r*0.31,hy-r*0.11,r*0.04,0,Math.PI*2);cx.fill();
  }
  cx.fillStyle='#2a0f00';cx.beginPath();cx.ellipse(0,hy+r*0.07,r*0.1,r*0.07,0,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#2a0f00';cx.lineWidth=r*0.07;cx.lineCap='round';cx.beginPath();cx.arc(0,hy+r*0.14,r*0.12,0.1,Math.PI-0.1);cx.stroke();
  if(isP){cx.fillStyle='#f5c518';cx.font='bold '+Math.round(r*0.78)+'px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('★',0,-r*1.13);}
  cx.restore();
}

function drawChair(cx,x,y,col){
  cx.save();cx.translate(x,y);
  var w=30,h=20,lh=17;
  cx.fillStyle=col||'#c8a96e';cx.strokeStyle='#8b6020';cx.lineWidth=1.5;
  cx.beginPath();cx.roundRect(-w/2,-h-8,w,10,3);cx.fill();cx.stroke();
  cx.beginPath();cx.roundRect(-w/2,-8,w,h,4);cx.fill();cx.stroke();
  cx.strokeStyle='#8b6020';cx.lineWidth=2.5;cx.lineCap='round';
  [[-w/2+5,h-8],[-w/2+12,h-8],[w/2-12,h-8],[w/2-5,h-8]].forEach(function(p){cx.beginPath();cx.moveTo(p[0],p[1]);cx.lineTo(p[0],p[1]+lh);cx.stroke();});
  cx.restore();
}

function buildIntro(){
  sel=-1;
  var row=document.getElementById('bear-row');row.innerHTML='';
  BC.forEach(function(c,i){
    var card=document.createElement('div');card.className='bcard';
    var cv2=document.createElement('canvas');cv2.width=52;cv2.height=58;
    var cx2=cv2.getContext('2d');drawBear(cx2,26,29,15,c,false,0,false,false,false,false);
    card.appendChild(cv2);
    var nm=document.createElement('span');nm.textContent=c.name;card.appendChild(nm);
    card.onclick=function(){
      sel=i;
      document.querySelectorAll('.bcard').forEach(function(cd,j){cd.classList.toggle('sel',j===i);});
      document.getElementById('hint').style.display='none';
      var si=document.getElementById('sel-info');si.textContent='你選了 '+c.name+'！';si.style.display='block';
      document.getElementById('btn-go').style.display='inline-block';
    };
    row.appendChild(card);
  });
  document.getElementById('hint').style.display='block';
  document.getElementById('sel-info').style.display='none';
  document.getElementById('btn-go').style.display='none';
}

function initG(){
  G={round:1,phase:'idle',_fp:false,bears:[],chairs:[],bigBear:{x:CX,y:CY,eyeClose:true},playerIdx:sel};
  buildRound(6,[0,1,2,3,4,5]);
}

function buildRound(cnt,ids){
  G.chairs=[];
  for(var i=0;i<cnt-1;i++){var a=(2*Math.PI*i/(cnt-1))-Math.PI/2;G.chairs.push({x:CX+OR*Math.cos(a),y:CY+OR*Math.sin(a),occ:false,col:null});}
  G.bears=[];
  for(var i2=0;i2<cnt;i2++){
    var a2=(2*Math.PI*i2/cnt)-Math.PI/2,ci=ids[i2];
    G.bears.push({id:ci,x:CX+WR*Math.cos(a2),y:CY+WR*Math.sin(a2),oA:a2,oD:(i2%2?-1:1),col:BC[ci],isP:(ci===G.playerIdx),alive:true,seated:false,grabbed:false,elim:false,wt:Math.random()*6,spd:2+Math.random()*0.6});
  }
  G.bigBear.eyeClose=true;G._fp=false;G.phase='idle';
}

function showMsg(t,d){d=d||1800;var el=document.getElementById('omsg');el.textContent=t;el.classList.add('on');clearTimeout(mT);mT=setTimeout(function(){el.classList.remove('on');},d);}
function setSt(t){document.getElementById('hud-s').textContent=t;}
function setRd(r){document.getElementById('hud-r').textContent='第 '+r+' 輪';}
function updHUD(){
  var b=document.getElementById('sbar');b.innerHTML='';
  G.bears.filter(function(x){return x.alive;}).forEach(function(b2){var d=document.createElement('div');d.className='sdot';d.style.background=b2.col.body;if(b2.isP)d.style.outline='2px solid #3a1a05';b.appendChild(d);});
}

var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function drawArena(){
  ctx.fillStyle='#fff3dc';ctx.fillRect(0,0,W,H);
  ctx.beginPath();ctx.arc(CX,CY,OR+54,0,Math.PI*2);ctx.fillStyle='#f0d898';ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,OR+54,0,Math.PI*2);ctx.strokeStyle='#d4a840';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,68,0,Math.PI*2);ctx.fillStyle='#ffe8b0';ctx.fill();ctx.strokeStyle='#d4a840';ctx.lineWidth=1.5;ctx.stroke();
  for(var i=0;i<24;i++){var a=i/24*Math.PI*2;ctx.beginPath();ctx.arc(CX+(OR+66)*Math.cos(a),CY+(OR+66)*Math.sin(a),3,0,Math.PI*2);ctx.fillStyle='#e8c060';ctx.fill();}
}

function loop(){
  ctx.clearRect(0,0,W,H);drawArena();
  var t=Date.now()/1000;
  if(G.phase==='music'){
    G.bears.filter(function(b){return b.alive&&!b.seated&&!b.grabbed;}).forEach(function(b){b.oA+=0.024*b.oD;b.x=CX+WR*Math.cos(b.oA);b.y=CY+WR*Math.sin(b.oA);b.wt+=0.17;});
  } else if(G.phase==='grabbing'){
    G.bears.filter(function(b){return b.alive&&!b.seated&&!b.grabbed;}).forEach(function(b){
      var best=null,bd=9999;
      G.chairs.forEach(function(c){if(!c.occ){var d=Math.hypot(c.x-b.x,c.y-b.y);if(d<bd){bd=d;best=c;}}});
      if(best){
        var dx=best.x-b.x,dy=best.y-b.y,dist=Math.hypot(dx,dy);
        b.wt+=0.2;
        var sp=b.isP?2.4:3;
        if(dist<b.spd*3.5&&!best.occ){best.occ=true;best.col=b.col.body;b.seated=true;b.x=best.x;b.y=best.y;}
        else if(dist>2){b.x+=dx/dist*b.spd*sp;b.y+=dy/dist*b.spd*sp;}
      }
    });
    var free=G.chairs.filter(function(c){return!c.occ;}).length,stillUns=G.bears.filter(function(b){return b.alive&&!b.seated&&!b.grabbed;}).length;
    if((free===0||stillUns===0)&&!G._fp){G._fp=true;gT=setTimeout(finishGrab,380);}
  }
  G.chairs.forEach(function(c){drawChair(ctx,c.x,c.y,c.col||'#c8a96e');});
  G.bears.filter(function(b){return!b.elim;}).sort(function(a,b){return a.y-b.y;}).forEach(function(b){
    var r=19;drawBear(ctx,b.x,b.y,r,b.col,b.isP,b.wt,b.seated,false,false,b.grabbed);
    if(!b.grabbed){
      ctx.save();ctx.font='600 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      var lbl=b.col.name+(b.isP?' ★':''),tw=ctx.measureText(lbl).width;
      ctx.fillStyle='rgba(255,249,240,0.9)';ctx.beginPath();ctx.roundRect(b.x-tw/2-5,b.y-r-22,tw+10,16,6);ctx.fill();
      ctx.fillStyle=b.col.body;ctx.fillText(lbl,b.x,b.y-r-14);ctx.restore();
    }
  });
  var br=27;drawBear(ctx,G.bigBear.x,G.bigBear.y,br,{body:'#5a3010',belly:'#8b5530'},false,t*0.45,false,true,G.bigBear.eyeClose,false);
  ctx.save();ctx.font='600 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  var lb2='大熊警長',tw2=ctx.measureText(lb2).width;
  ctx.fillStyle='rgba(255,249,240,0.9)';ctx.beginPath();ctx.roundRect(G.bigBear.x-tw2/2-6,G.bigBear.y-br-27,tw2+12,18,7);ctx.fill();
  ctx.fillStyle='#5a3010';ctx.fillText(lb2,G.bigBear.x,G.bigBear.y-br-18);ctx.restore();
  if(G.phase==='eliminating'&&G._gt){
    ctx.save();ctx.strokeStyle='#5a3010';ctx.lineWidth=8;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(G.bigBear.x,G.bigBear.y);ctx.lineTo(G._gt.x,G._gt.y);ctx.stroke();ctx.restore();
  }
  updHUD();af=requestAnimationFrame(loop);
}

function startMusic(){
  if(G.phase!=='idle')return;
  G.phase='music';G.bigBear.eyeClose=true;G._fp=false;
  document.getElementById('bms').disabled=true;document.getElementById('bss').disabled=false;
  setSt('音樂響起！小熊快跑！');startAudio();
  sT=setTimeout(doStop,2500+Math.random()*3500);
}
function doStop(){
  if(G.phase!=='music')return;
  clearTimeout(sT);stopAudio();pStop();G.phase='grabbing';G._fp=false;
  document.getElementById('bss').disabled=true;setSt('音樂停！快搶椅子！');showMsg('搶椅子！',1200);
}
function finishGrab(){
  if(G.phase!=='grabbing')return;
  G._fp=false;G.phase='eliminating';
  var uns=G.bears.filter(function(b){return b.alive&&!b.seated;});
  if(!uns.length){advRound();return;}
  var v=uns[uns.length-1];v.grabbed=true;G.bigBear.eyeClose=false;G._gt=v;pGrab();
  var isP=v.isP;showMsg(v.col.name+'被抓走了！',1800);
  setTimeout(function(){v.alive=false;v.elim=true;G._gt=null;if(isP)setTimeout(function(){endG(false);},1800);else setTimeout(advRound,1800);},1000);
}
function advRound(){
  var alive=G.bears.filter(function(b){return b.alive;});
  if(alive.length<=1){endG(alive[0]&&alive[0].isP);return;}
  G.round++;setRd(G.round);buildRound(alive.length,alive.map(function(b){return b.id;}));setSt('下一輪！按開始音樂');document.getElementById('bms').disabled=false;
}
function endG(won){
  stopAudio();cancelAnimationFrame(af);
  if(won){pWin();showMsg('你贏了！音樂椅冠軍！',4000);setSt('恭喜！你是最後的贏家！');}
  else{showMsg('遊戲結束！',3000);setSt('被大熊抓走了！按回主選單再試！');}
  document.getElementById('bms').disabled=true;document.getElementById('bss').disabled=true;
}

cv.addEventListener('click',function(e){
  if(G.phase!=='grabbing')return;
  var rc=cv.getBoundingClientRect(),sx=W/rc.width,sy=H/rc.height;
  var mx=(e.clientX-rc.left)*sx,my=(e.clientY-rc.top)*sy;
  var pl=null;G.bears.forEach(function(b){if(b.isP&&b.alive&&!b.seated&&!b.grabbed)pl=b;});if(!pl)return;
  var best=null,bd=9999;
  G.chairs.forEach(function(c){if(!c.occ){var d=Math.hypot(c.x-mx,c.y-my);if(d<bd){bd=d;best=c;}}});
  if(best&&bd<90&&!best.occ){best.occ=true;best.col=pl.col.body;pl.seated=true;pl.x=best.x;pl.y=best.y;}
});

document.getElementById('btn-go').onclick=function(){
  if(sel<0)return;
  document.getElementById('intro-screen').style.display='none';
  var gs=document.getElementById('game-screen');gs.style.display='flex';gs.style.flexDirection='column';
  initG();setRd(1);setSt('按「開始音樂」');updHUD();loop();
};
document.getElementById('bms').onclick=startMusic;
document.getElementById('bss').onclick=doStop;
document.getElementById('bbk').onclick=function(){
  cancelAnimationFrame(af);stopAudio();clearTimeout(sT);clearTimeout(gT);
  document.getElementById('game-screen').style.display='none';
  document.getElementById('intro-screen').style.display='flex';
  buildIntro();
};

buildIntro();
</script>
